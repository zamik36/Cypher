# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Uses pre-built images from ghcr.io. Set GHCR_REPO in .env (e.g. ghcr.io/zamik36/cypher).
# Falls back to local build if image is not available.
services:
  caddy:
    image: caddy:2-alpine@sha256:3b2a0196e0687279c14c27adff9fc6b44acfa318dbb97eaebe385bdf99e5364c
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    tmpfs:
      - /tmp
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN in .env}"
    depends_on:
      - gateway
      - pwa
      - grafana
    restart: unless-stopped
    networks:
      - internal

  loki:
    image: grafana/loki@sha256:757b5fadf816a1396f1fea598152947421fa49cb8b2db1ddd2a6e30fae003253
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./deploy/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - internal

  alloy:
    image: grafana/alloy@sha256:eadfe35ea52b26cbec4d4d780fbcc31edb31108c1c9e537ca59557a5a102c712
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./deploy/alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - internal

  prometheus:
    image: prom/prometheus@sha256:5ccad477d0057e62a7cd1981ffcc43785ac10c5a35522dc207466ff7e7ec845f
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - internal

  grafana:
    image: grafana/grafana@sha256:0dc5a246ab16bb2c38a349fb588174e832b4c6c2db0981d0c3e6cd774ba66a54
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - internal

  # Override: use ghcr.io images, remove external port bindings.
  # IMPORTANT: Do NOT expose port 9101 (WS) externally — it is plaintext.
  # NOTE: user "0:0" is required to read TLS certs from the shared caddy-data volume;
  # root is heavily constrained via cap_drop, read_only, and no-new-privileges.
  gateway:
    image: ${GHCR_REPO}/cypher-gateway:latest
    user: "0:0"
    read_only: true
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    environment:
      LOG_FORMAT: json
      P2P_TLS_CERT_PATH: "/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.crt"
      P2P_TLS_KEY_PATH: "/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.key"
    volumes:
      - caddy-data:/caddy-data:ro
    ports: !override
      - "9100:9100"
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  signaling:
    image: ${GHCR_REPO}/cypher-signaling:latest
    read_only: true
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    volumes:
      - signaling-data:/data/signaling
    environment:
      LOG_FORMAT: json
    ports: !override
      - "3478:3478/udp"
      - "127.0.0.1:9091:9091"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  relay:
    image: ${GHCR_REPO}/cypher-relay:latest
    user: "0:0"
    read_only: true
    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    cap_add:
      - CHOWN
    volumes:
      - caddy-data:/caddy-data:ro
      - relay-data:/data/relay
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - chown -R 0:0 /data/relay && exec relay
    environment:
      LOG_FORMAT: json
      P2P_TLS_CERT_PATH: "/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.crt"
      P2P_TLS_KEY_PATH: "/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${DOMAIN}/${DOMAIN}.key"
    ports: !override
      - "9300:9300"
      - "127.0.0.1:9092:9092"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  pwa:
    image: ${GHCR_REPO}/cypher-pwa:latest
    ports: !override []

  redis:
    ports: !override []

  nats:
    ports: !override []

volumes:
  caddy-data:
  caddy-config:
  signaling-data:
  relay-data:
  prometheus-data:
  grafana-data:
  loki-data:
