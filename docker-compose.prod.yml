# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Uses pre-built images from ghcr.io. Set GHCR_REPO in .env (e.g. ghcr.io/zamik36/cypher).
# Falls back to local build if image is not available.
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN in .env}"
      GATEWAY_PORT: "${GATEWAY_PORT:-9100}"
      RELAY_PORT: "${RELAY_PORT:-9300}"
    depends_on:
      - gateway
      - pwa
      - grafana
    restart: unless-stopped
    networks:
      - internal

  loki:
    image: grafana/loki:3.0.0
    volumes:
      - ./deploy/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./deploy/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.0.0
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SERVER_ROOT_URL: "https://${DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - internal

  # Override: use ghcr.io images, remove external port bindings.
  # IMPORTANT: Do NOT expose port 9101 (WS) externally — it is plaintext.
  gateway:
    image: ${GHCR_REPO}/cypher-gateway:latest
    environment:
      LOG_FORMAT: json
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  signaling:
    image: ${GHCR_REPO}/cypher-signaling:latest
    environment:
      LOG_FORMAT: json
    ports:
      - "3478:3478/udp"
      - "127.0.0.1:9091:9091"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  relay:
    image: ${GHCR_REPO}/cypher-relay:latest
    environment:
      LOG_FORMAT: json
    ports:
      - "127.0.0.1:9092:9092"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  pwa:
    image: ${GHCR_REPO}/cypher-pwa:latest
    ports: []

  redis:
    ports: []

  nats:
    ports: []

volumes:
  caddy-data:
  caddy-config:
  prometheus-data:
  grafana-data:
  loki-data:
