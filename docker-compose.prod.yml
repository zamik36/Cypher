# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN in .env}"
      GATEWAY_PORT: "${GATEWAY_PORT:-9100}"
      RELAY_PORT: "${RELAY_PORT:-9300}"
    depends_on:
      - gateway
      - pwa
    restart: unless-stopped
    networks:
      - internal

  # Override: remove external port bindings (Caddy handles external traffic).
  # IMPORTANT: Do NOT expose port 9101 (WS) externally — it is plaintext.
  # Caddy terminates TLS and proxies /ws* to gateway:9101 inside the Docker network.
  gateway:
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  signaling:
    ports:
      - "3478:3478/udp"
      - "127.0.0.1:9091:9091"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  relay:
    ports:
      - "127.0.0.1:9092:9092"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  pwa:
    ports: []

  redis:
    ports: []

  nats:
    ports: []

volumes:
  caddy-data:
  caddy-config:
