[advisories]
ignore = [
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained (migrating later)
    "RUSTSEC-2024-0437",  # protobuf v2: recursion crash (prometheus 0.13 dep, no upgrade path)
    "RUSTSEC-2024-0436",  # paste: unmaintained via optional arti-client Tor stack, no safe replacement upstream yet
    "RUSTSEC-2023-0071",  # rsa Marvin timing advisory via optional arti-client Tor stack, no safe upgrade available yet
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
