[advisories]
ignore = [
    "RUSTSEC-2026-0049",  # rustls-webpki 0.102.8: CRL distribution point (async-nats dep, can't upgrade)
    "RUSTSEC-2025-0134",  # rustls-pemfile: unmaintained (migrating later)
    "RUSTSEC-2024-0437",  # protobuf v2: recursion crash (prometheus 0.13 dep, no upgrade path)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
