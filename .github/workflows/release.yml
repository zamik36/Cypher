name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker-release:
    name: Docker Release Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Extract version and repo
        id: version
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build & push gateway
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: gateway
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-gateway:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-gateway:latest
          cache-from: type=gha

      - name: Build & push signaling
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: signaling
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-signaling:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-signaling:latest
          cache-from: type=gha

      - name: Build & push relay
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: relay
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-relay:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-relay:latest
          cache-from: type=gha

      - name: Build & push PWA
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./clients/pwa/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-pwa:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.version.outputs.repo }}/cypher-pwa:latest
          cache-from: type=gha

  desktop-release:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
        with:
          key: desktop-${{ matrix.target }}-${{ hashFiles('crates/**/*.rs', 'clients/desktop/src-tauri/src/**/*.rs') }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Install desktop dependencies
        run: cd clients/desktop && npm install
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: clients/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Cypher ${{ github.ref_name }}"
          releaseBody: "See the assets for platform-specific installers."
          releaseDraft: false
          prerelease: false

  android-release:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
        with:
          key: android-${{ hashFiles('crates/**/*.rs', 'clients/desktop/src-tauri/src/**/*.rs') }}
          workspaces: clients/desktop/src-tauri
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - name: Install dependencies
        run: cd clients/desktop && npm install
      - name: Initialize Android project
        run: cd clients/desktop && npx tauri android init
      - name: Generate Android icons from source
        run: cd clients/desktop && npx tauri icon src-tauri/icons/icon.png
      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > clients/desktop/src-tauri/gen/android/release.keystore
      - name: Patch Android version code
        run: |
          GRADLE_FILE="clients/desktop/src-tauri/gen/android/app/build.gradle.kts"
          VERSION="${GITHUB_REF#refs/tags/v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 1000000 + MINOR * 10000 + PATCH * 100))

          sed -i "s/versionCode = .*/versionCode = ${VERSION_CODE}/" "$GRADLE_FILE"
          sed -i "s/versionName = .*/versionName = \"${VERSION}\"/" "$GRADLE_FILE"

          echo "Set versionCode=${VERSION_CODE}, versionName=${VERSION}"
          grep -E 'versionCode|versionName' "$GRADLE_FILE"
      - name: Configure APK signing
        run: |
          GRADLE_FILE="clients/desktop/src-tauri/gen/android/app/build.gradle.kts"
          KEYSTORE_PATH="${{ github.workspace }}/clients/desktop/src-tauri/gen/android/release.keystore"

          # Insert signingConfigs block before buildTypes
          sed -i "/buildTypes {/i\\
              signingConfigs {\\
                  create(\"release\") {\\
                      storeFile = file(\"${KEYSTORE_PATH}\")\\
                      storePassword = \"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\"\\
                      keyAlias = \"${{ secrets.ANDROID_KEY_ALIAS }}\"\\
                      keyPassword = \"${{ secrets.ANDROID_KEY_PASSWORD }}\"\\
                  }\\
              }" "$GRADLE_FILE"

          # Wire release buildType to use the signing config
          sed -i '/getByName("release") {/a\
                      signingConfig = signingConfigs.getByName("release")' "$GRADLE_FILE"
      - name: Build Android APK
        run: cd clients/desktop && npx tauri android build --apk --target aarch64
      - name: Rename APK with version and commit hash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${GITHUB_REF#refs/tags/v}"
          APK_DIR="clients/desktop/src-tauri/gen/android/app/build/outputs/apk"
          find "$APK_DIR" -name '*.apk' | while read -r apk; do
            dir=$(dirname "$apk")
            mv "$apk" "$dir/cypher-${VERSION}-${SHORT_SHA}.apk"
          done
      - name: Upload APK
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: clients/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
