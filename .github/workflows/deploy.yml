name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NATS_AUTH_TOKEN: ${{ secrets.NATS_AUTH_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOMAIN,REDIS_PASSWORD,NATS_AUTH_TOKEN,DEPLOY_PATH,DEPLOY_SHA
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/cypher}"

            # Save current commit SHA for rollback
            PREV_SHA=$(git rev-parse --short=8 HEAD)
            echo "Previous SHA: $PREV_SHA"

            # Checkout the exact SHA that CI tested
            git fetch origin main
            git checkout "$DEPLOY_SHA"
            CURR_SHA=$(git rev-parse --short=8 HEAD)
            echo "Deploying SHA: $CURR_SHA"

            # Generate .env with restricted permissions
            umask 077
            printf 'DOMAIN=%s\nREDIS_PASSWORD=%s\nNATS_AUTH_TOKEN=%s\n' "$DOMAIN" "$REDIS_PASSWORD" "$NATS_AUTH_TOKEN" > .env

            # Pull latest images
            docker compose pull

            # Restart services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --force-recreate

            # Wait for services to become healthy
            echo "Waiting for services..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:9090/metrics > /dev/null 2>&1; then
                break
              fi
              if [ "$i" = "6" ]; then
                echo "Services did not become healthy within 30s"
                docker compose logs --tail=30
                exit 1
              fi
              echo "Retry $i..."
            done

            # Smoke tests
            curl -sf http://localhost:9090/metrics > /dev/null && echo "gateway: OK"
            curl -sf http://localhost:9091/metrics > /dev/null && echo "signaling: OK"

            # Persist previous SHA for rollback
            echo "$PREV_SHA" > .prev-deploy-sha
            echo "Deploy successful"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/cypher}"

            if [ -f .prev-deploy-sha ]; then
              PREV_SHA=$(cat .prev-deploy-sha)
              echo "Rolling back to SHA: $PREV_SHA"
              git checkout "$PREV_SHA"
            else
              echo "No previous SHA recorded, rolling back one commit"
              git checkout HEAD~1
            fi

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
            echo "Rolled back successfully"
