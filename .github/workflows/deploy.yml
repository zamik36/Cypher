name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          NATS_AUTH_TOKEN: ${{ secrets.NATS_AUTH_TOKEN }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOMAIN,REDIS_PASSWORD,NATS_AUTH_TOKEN,GRAFANA_PASSWORD,DEPLOY_PATH,DEPLOY_SHA,GHCR_TOKEN,GHCR_USER
          command_timeout: 10m
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/cypher}"

            PREV_SHA=$(git rev-parse --short=8 HEAD)
            echo "Previous SHA: $PREV_SHA"

            git fetch origin main
            git checkout "$DEPLOY_SHA"
            echo "Deploying SHA: $(git rev-parse --short=8 HEAD)"

            # Generate .env — secrets come from envs parameter, values stay in-file only
            umask 077
            export GHCR_REPO="ghcr.io/zamik36/cypher"
            : > .env
            for var in DOMAIN REDIS_PASSWORD NATS_AUTH_TOKEN GHCR_REPO GRAFANA_PASSWORD; do
              printf '%s=%s\n' "$var" "$(printenv "$var")" >> .env
            done

            # Pull pre-built images from ghcr.io
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Restart
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate

            # Health checks
            echo "Waiting for services..."
            for i in 1 2 3 4 5 6; do
              sleep 5
              if curl -sf http://localhost:9090/metrics > /dev/null 2>&1 \
                && curl -sf http://localhost:9091/metrics > /dev/null 2>&1 \
                && curl -sf http://localhost:9092/metrics > /dev/null 2>&1; then
                break
              fi
              if [ "$i" = "6" ]; then
                echo "Services did not become healthy within 30s"
                docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=30
                exit 1
              fi
              echo "Retry $i..."
            done

            curl -sf http://localhost:9090/metrics > /dev/null && echo "gateway: OK"
            curl -sf http://localhost:9091/metrics > /dev/null && echo "signaling: OK"
            curl -sf http://localhost:9092/metrics > /dev/null && echo "relay: OK"

            echo "$PREV_SHA" > .prev-deploy-sha
            docker logout ghcr.io
            echo "Deploy successful"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-$HOME/cypher}"

            if [ -f .prev-deploy-sha ]; then
              PREV_SHA=$(cat .prev-deploy-sha)
              echo "Rolling back to SHA: $PREV_SHA"
              git checkout "$PREV_SHA"
            else
              echo "No previous SHA recorded, rolling back one commit"
              git checkout HEAD~1
            fi

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
            echo "Rolled back successfully"
