name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: cargo check
        run: cargo check --all-targets --all-features
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: cargo test
        run: cargo test --all

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz proto dispatch
        run: cd crates/cypher-proto && cargo +nightly fuzz run fuzz_dispatch -- -max_total_time=60
      - name: Fuzz proto decode_bytes
        run: cd crates/cypher-proto && cargo +nightly fuzz run fuzz_decode_bytes -- -max_total_time=60
      - name: Fuzz crypto aead
        run: cd crates/cypher-crypto && cargo +nightly fuzz run fuzz_aead -- -max_total_time=60
      - name: Fuzz crypto ratchet
        run: cd crates/cypher-crypto && cargo +nightly fuzz run fuzz_ratchet -- -max_total_time=60

  deny:
    name: Deny (license & advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2
        with:
          command: check
          arguments: --all-features

  pwa-build:
    name: PWA Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/pwa/package-lock.json
      - name: Install dependencies
        run: cd clients/pwa && npm ci
      - name: Build PWA
        run: cd clients/pwa && npm run build
      - name: Upload PWA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pwa-dist
          path: clients/pwa/dist/

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [check, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push gateway
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: gateway
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cypher-gateway:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/cypher-gateway:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push signaling
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: signaling
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cypher-signaling:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/cypher-signaling:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push relay
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          target: relay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cypher-relay:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/cypher-relay:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push PWA
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./clients/pwa
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cypher-pwa:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/cypher-pwa:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
