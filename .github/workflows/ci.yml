name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check --all-targets --all-features
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz proto dispatch
        run: cd crates/cypher-proto && cargo +nightly fuzz run fuzz_dispatch -- -max_total_time=60
      - name: Fuzz proto decode_bytes
        run: cd crates/cypher-proto && cargo +nightly fuzz run fuzz_decode_bytes -- -max_total_time=60
      - name: Fuzz crypto aead
        run: cd crates/cypher-crypto && cargo +nightly fuzz run fuzz_aead -- -max_total_time=60
      - name: Fuzz crypto ratchet
        run: cd crates/cypher-crypto && cargo +nightly fuzz run fuzz_ratchet -- -max_total_time=60

  deny:
    name: Deny (license & advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
